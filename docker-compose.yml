services:
  nginx:
    image: nginx:1.27-alpine
    container_name: rinha-nginx
    ports:
      - "9999:9999"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "24MB"

  api1:
    build:
      context: .
    image: rinha-be-2026-api:local
    hostname: api1
    environment:
      HTTP_ADDR: ":8080"
      REFERENCES_PATH: "/app/data/references.bin"
      IVF_NPROBE: "4"
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "128MB"

  api2:
    build:
      context: .
    image: rinha-be-2026-api:local
    hostname: api2
    environment:
      HTTP_ADDR: ":8080"
      REFERENCES_PATH: "/app/data/references.bin"
      IVF_NPROBE: "4"
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "128MB"
