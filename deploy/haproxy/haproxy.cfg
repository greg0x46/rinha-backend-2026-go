global
    daemon
    maxconn 20000
    nbthread 1

defaults
    mode tcp
    timeout connect 1s
    timeout client 5s
    timeout server 2s
    timeout queue 1s
    retries 0
    backlog 4096

frontend rinha_in
    bind :9999
    default_backend rinha_api

backend rinha_api
    balance roundrobin
    default-server maxconn 3000
    server api1 unix@/sockets/api1.sock
    server api2 unix@/sockets/api2.sock
