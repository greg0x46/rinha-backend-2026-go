services:
  haproxy:
    image: haproxy:2.9-alpine
    container_name: rinha-haproxy
    ports:
      - "9999:9999"
    volumes:
      - ./deploy/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "24MB"
